front:
  text: 修真十書雜著捷徑卷之十八李四
  hash: sha256:d336d2ad845da2d8a4b92f392aa467f96d2851194fe3f148e5dd49aceb17cf8f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_002-001a, image: hfl/0125/0125-048.png}
body:
  text: 體殼歌煙蘿子撰我今責這憨軀殼只為從前愛乖角三尸業鬼縱交往一片身心難把捉六賊使得終朝亂見色逢財將命𢬵身軀不覺業來纏人前賣弄樓羅漢更説圖謀誇好手資財營運磨星斗富如王愷與石崇死後幽泉獨自走苦愛腥羶與穢濁瓌得身軀如刻削口中獨道得便宜你是一場愚蠢朴蠢朴暫時聽我語無限荒郊堆冢墓哀哉白骨被塵漫往日英雄歸甚處不如聞早身心誨免使沉埋為下鬼時人一死無復生浩浩東流如逝水我今求得長生訣等間休向他人説忽然悮慢泄天機必遭神明暗地折吕公縛心猿詩咄咄心猿聽我陳無端叵耐汝頑嚚終朝恣縱三尸鬼作壞流年四大身數度為財遭恥辱幾回酒色減精神不如縛取深山去汝又如何損得人養生息命詩捉得金精養命基日華東畔月華西壺中自有長生藥返老還童天地齊勸君勤學守三一中有長生不死術能存玄真萬事畢一身精神不妄失朱提點內境論人有咽有喉咽則咽物喉則通氣二竅各不相離喉在前咽在後喉主出納咽則吞之而已喉字從侯自內出者喉達之于外自外入者喉達之于內所謂呼者因陽出吸者隨陰入咽則因物而後咽焉故咽字從因咽應地氣為胃之系下連胃脘為水穀之路自咽門而入於胃咽為扼要之地又謂之嗌焉喉應天氣為肺之系下接肺經為喘息之道自喉嚨而通於肺肺下無竅四有空行以分布清濁之氣而為氣管肺之下有心心之下有膈膜與脊脅周回相著遮蔽濁氣不上薰於心肺所謂膻中也膈膜之下有脾胃肝膽焉脾者土也居胃之上與胃膜相連所以埤諸胃肝者木也陰未退聽吁之而出故其治在左其位在右胃之下有小腸小腸之右有大腸大腸之側膀胱也小陽為受盛之官化物出焉凡胃中腐熟水穀其氣自胃之上口曰賁門傳於肺播於諸爬其滓穢自胃之下口曰幽門傳入於小腸自小腸下口曰闌門泌别而水入膀胱其滓穢則入大腸大腸以其四屈而受小腸之穀所謂傳送之官也膀胱一名胞胞者鞄也以虛受水為津液之府故云膀胱者胞之室也膀胱不利為癃不約為遺溺心有大者邪者直者有竅者無竅者了無相似真心不受邪其病者心包也所謂手心主是也在心下橫膜之上堅膜之下與橫膜相粘而黃脂漫包者真心也其漫脂之外有細筋膜如絲與心肺相連者包絡也肝有獨葉者有二葉者有三葉者腎有二精所舍也以腎為事元氣屬焉形如江豆相並而曲附於脊膂外有脂裹裏白外紫有絲二道上系於心下連於腎通而為一所謂坎南離北水火相感腎雖有二其一曰命門與臍相對黃庭云兩部水王對生門又曰後有密户前生門生門者臍也嬰兒在母腹中取氣於臍管母呼亦呼母吸亦吸正與密户相對所謂臍者如此與煙蘿子圖不差矣近世刑人於市剖而見之乃云喉中有三竅一水一食一氣其誣甚矣又云腎一在肝之右微下一在脾之左微上乃以煙蘿子朝真圖為非豈知足厥陰受病則舌捲而卵縮況刀鋸之恐耶煙蘿子內觀經天地媾精萬物化生父母交合人從以生一月為胞二月為胎三月成魂四月成魄五月分臟六月分腑七月開竅八月神具九月定精十月氣足始生之時神源清淨既納有形形染六情眼則貪色耳則滯聲口則耽味鼻則受馨意懷健羡身欲肥輕從兹流浪莫能自悟聖人慈念使之內觀己身澄其心也心澄神靜亂想不入邪妄不侵憂患咸消虛室生白唯在澄心也存守九宫訣頭有九宫上象九天下法九地身有九竅十二樓左右兩眉間却入一寸為明堂宫有太乙君居焉左有紫房右有朱户著錦衣貌如嬰兒為身形之主也却入二寸為洞房宫中有三真人左無英右白元中黃雲却入三寸為丹田宫却入四寸為流珠宫却入五寸為玉帝宫明堂上一寸為天庭宫洞房上一寸為極真宫丹田上一寸為玄丹宫流珠上一寸為天皇宫三丹三田論氣中生神神在上丹精中生氣氣在中丹真水真氣合而成精精在下丹上田神舍中田氣府下田精區外丹內丹論氣象於天地變通於陰陽陽龍陰虎木液金精二氣交合而成者謂之外丹含和鍊藏吐故納新上入泥丸下注丹田中朝絳宫此乃謂之內丹內丹可以延年外丹可以升舉學道者宜勉之心臟總論神在心為帝王又為絳宫為靈臺為中丹田屬火太陽之精上應熒惑夏旺其色赤在方為丙丁在象為朱雀在道為禮在卦為離其形如未開蓮花有三葉見於內者為脈見於外者為色以口舌為門户小腸為府受腎之制伏而驅用於肺得肝則盛見脾則減為五臟之主正則辟邪然多食鹹則傷心切宜愼之肝臟總論魂在肝肝為丞相屬木春旺其色青在方為甲乙在象為青龍在道為仁在卦為震其形有七葉膽為將軍在肝左邊第四葉內見於內者為筋於外者為爪以目為户以膽為府受肺之制伏而驅用於脾得腎則盛見心則減也然食辛多則傷肝切須戒之脾臟總論志在脾為丈夫屬土四季旺色黃在方為中央在道為信其形如刀鎌見於內者為藏均養心腎肝肺見於外者為肉以唇齒為户受肝之制伏而驅用於腎得心則盛見肺則減喜甜好溫胃神附之怕寒忌冷磨則進食身安否則病若食酸多則傷脾切宜省之肺臟總論魄在肺為尚書屬金秋旺其色白在方為庚辛在象為白虎在道為義在卦為兊其形為華蓋見於內者為膚見於外者為毛以鼻為户以大腸為府受心之制伏而驅用於肝得脾則盛見腎則減怕冷成嗽疾食苦多則傷肺也腎臟總論精在腎又號玄英屬水冬旺其色黑在方為壬癸在象為玄武在道為智在卦為坎有二雙在左為烈女右為命門生帶子透入泥丸宫見於內者為骨見於外者為髮以耳為户膀胱為府受脾之制伏而驅用於心得肺則盛見肝則減食甘多則有傷矣泥丸名谷神一名下玄宫天腦者一身之宗百神之會道合太玄故曰泥丸三丹田兩眉間為上丹田心為中丹田臍輪三寸為下丹田三焦湧泉為足心也心以上至泥丸上焦心下至臍中焦臍至湧泉下焦制三魂神每月初三十三二十三曰離人身上天曹言人善事其夜欲卧時叩齒三通呼其名曰爽靈益祿胎光延生幽精却死太上老君急急如律令常依此言即獲長生矣制七魄神每月朔望晦日離人身上天奏人惡事其夜欲卧時叩齒呼其名即與赦罪其名曰尸狗伏矢雀陰蜚毒吞賊除穢臭肺制三尸符神名彭琚好車馬衣服彭質好飲酒彭矯好色欲此神與人身同生能興三業欲人速亡遇晦朔日上奏于天苟能制之立見長生今具太白山制三尸九蟲符于後上尸符中尸符下尸符每遇庚申夜書此符吞之三尸九蟲自然消滅令人魂神安靜常以靜夜呼名念之大吉凡遇甲子庚申切忌夫妻共寢食務在清淨則三尸自滅矣修真十書雜著捷徑卷之十八修真十書雜著捷徑卷之十九李五鍾離八段錦法閉目冥心坐冥心盤趺而坐握固靜思神叩齒三十六兩手抱崑崙叉兩手向項後數九息勿令耳聞自此以後出入息皆不可使耳聞左右鳴天鼓二十四度聞移兩手心掩兩耳先以第二指壓中指彈擊腦後左右各二十四次微擺撼天柱搖頭左右顧肩膊隨動二十四先須握固赤龍攪水渾赤龍者舌也以舌攪口齒並左右頰待津液生而咽漱津三十六一云鼓漱神水滿口勻一口分三咽所漱津液分作三口作汩汩聲而咽之龍行虎自奔液為龍氣為虎閉氣搓手熱以鼻引清氣閉之少頃搓手令極熱鼻中徐徐乃放氣出背摩後精門精門者腰後外腎也合手心摩串收手握固盡此一口氣再閉氣也想火燒臍輪閉口鼻之氣想用心火下燒丹田覺熱極即用後法左右轆轤轉俯首擺撼兩肩三十六想火自丹田透雙關入腦户鼻引清氣間步頃間兩腳放舒伸放直兩腳叉手雙虛托叉手相交向上托空三次或九次低頭攀足頻以兩手向前攀腳心十二次乃收足端坐以候逆水上候口中津液生如未生再用急攪取水同前法再漱再吞津如此三度畢神水九次吞謂再漱三十六如前一口分三咽乃為九也咽下汩汩響百脈自調勻河車搬運訖擺肩並身二十四及再轉轆轤二十四次發火遍燒身想丹田火自下而上遍燒身體想時口及鼻皆閉氣少頃邪魔不敢近夢寐不能昏寒暑不能入災病不能迍子後午前作造化合乾坤循環次第轉八卦是良因訣曰其法於甲子日夜半子時起首行時口中不得出氣唯鼻中微放清氣每日子後午前各行一次或晝夜共行三次久而自知蠲除疾疫漸覺身輕若能勤苦不怠則仙道不遠矣第一段叩齒集神三十六兩手抱崑崙雙手擊天鼓二十四第二段左右搖天柱各二十四第三段左右舌攪上三十六漱三十六分作三口如硬物咽之然後方得行火第四段兩手磨腎堂三十六以數多更妙第五段左右單關轆轤各三十六第六段雙關轆轤三十六第七段兩手相搓當呵五呵後又手托天按頂各三或九次第八段以兩手如鈎向前攀雙腳心十二再收足端坐去病延壽六字法其法以口吐鼻取總訣肝若噓時目爭精肺知呬氣手雙擎心呵頂上連叉手腎吹抱取膝頭平脾病呼時須撮口三焦客熱卧嘻嘻腎吹氣腎為水病主生門有疾尫羸氣色昏眉蹙耳鳴兼黑瘦吹之邪妄立逃奔心呵氣心源煩燥急須呵此法通神更莫過喉內口瘡並熱痛依之目下便安和肝噓氣肝主龍塗位號心病來還覺好酸辛眼中赤色兼多泪噓之病去立如神肺呬氣呬呬數多作生涎胸膈煩滿上焦痰若有肺病急須呬用之目下自安然脾呼氣脾病屬土號太倉有痰難教盡擇方瀉痢腸鳴並吐水急調呼字次丹成三焦嘻三焦有病急須嘻古聖留言最上醫若或通知去壅塞不因此法又何知孫真人四季行工養生歌春噓明目木扶肝夏至呵心火自闌秋呬定收金肺潤腎吹唯要坎中安三焦嘻却除煩熱四季長呼脾化餐切忌出聲聞口耳其功尤勝保神丹修真十書雜著捷徑卷之十九
