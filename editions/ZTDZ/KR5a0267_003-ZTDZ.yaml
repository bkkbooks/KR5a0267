front:
  text: 修眞十書雜著捷徑卷之二十
  hash: sha256:af5ba70feace16501eca0c336b2171b9d1ecd6311878137a1573e4ca7417f84f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_SJB_003-040695b, image: sjb/04/040695b.png}
body:
  text: 養生篇八十一章一恍惚中有物象幽深微妙元通欲驗六宫聚氣且觀兩臉潮紅二五行有眞造化循環相剋相生一片黄雲蓋鼎其中金液丹成三靜坐少思寡欲㝠心養氣存神此是修眞要訣學者可以書紳四打坐正如打硬曉夜不容少休何似放教自在一身有脉通流五高尚千口水法吕公八段錦文更有六字氣訣盡是安樂法門六鼻逐五香而塞日遂五色以盲是謂金木間隔陰魄載了陽魂七養氣如養小兒去欲如去蔓草定甲七情不生清淨無爲是道八身中有三昧火宿之彌壯長生歛散勿令炎上方可耳目聰明九正炁須盈腔裏何妨燕處超然達磨得胎息法故能面壁九年十眞炁不離丹竈元和常滿玉池飲食切須調節飢中飽後無飢十一食後連行百步雙手將肚摩娑夜半五更睡覺五藏濁炁須呵十二二液枯而眼暗腦氣洩則耳聾智者能和五藏三焦六府宣通十三坐卧須閉地户升降仍勒陽關捉住眞龍眞虎自成九轉還丹十四晝取日精吞鍊夜分仍進月華眞火眞水既濟自然種出黄芽十五不離心心是道衆妙共集一眞老而不死曰仙無病而死曰人十六學道本無難事自是人心不堅初時鍊漉辛苦成就只一二年十七按月遵行易卦陰陽消長六爻此法未爲簡易天眞别有逍遥十八修養所戒有三大怒大欲大醉三者若有一焉即時損失眞氣十九佛之所以爲佛仙之所以爲仙無非立誠而致精讀中庸一篇二十寅至申爲七返卯至坤爲九還小而論之一日大而論之一年二十一住炁調匀千息升身撞透三關鍊得形神俱妙方知火滿金田二十二莫殢嚥津行氣徒令苦己勞形自有紅樓寳塔五雲結就黄庭二十三靈根有陰陽髓調和入鼎烹煎醍醐上通絳闕冲氣下徹湧泉二十四妙處兼忘四象透時豈問五行要得抱元守一自聽玉響金聲二十五虚籟時聞天鼓元珠常照深淵白雪鍊成赤水火龍耕就芝田二十六至道不拘子午無爲豈問朝昏若要三花聚頂須令五氣朝元二十七出青入玄甚焕盡歸玄牝之門果欲長生不死勸君修取崑崙二十八靈臺不留一物收神歸到神中十二樓前春水赤龍雪浪飜空二十九靈物何常有病九竅百骸自安有病不須服藥只消返照内觀三十妙用循環不絶搬運豈假河車一點靈和常在自然金鼎丹砂三十一學道須積陰德不然動有障魔若有宿植根本自與福力相和三十二廣成千二百歲守一能處其和雖有嬰兒姹女交親須藉黄婆三十三衆生如未成佛終不取此泥團此道殊途一致老子即是瞿曇三十四如來教俱絺羅㝠心觀鼻端白消息身心内明圓通斯爲第一三十五足忘腰忘心忘一性湛然常寂顏回能忘所忘所以能適其適三十六短命死非不幸定是脱殻神游故雖天縱將聖須讓他出一頭三十七鍾離靈寳畢法修眞直至超昇諄諄明告學者只患人不能行三十八學者必求名師名師世間難遇修行若是到時神仙自來濟度三十九陳摶神超形悴於世功行未圓蓬萊雲歸獨步直須行滿三千四十學人愼毋貪睡夢中引入諸邪若要眞元不散釣出心中毒蛇四十一學道不必貪多勤心拳拳守一靈源志中有云得了善時勿失四十二知寒先須著衣覺煖漸次解脱坐避濕氣賊風食忌生冷硬物四十三純陰無陽曰鬼純陽無陰曰仙吕公號純陽子所以得成其天四十四大道如行正路㝠行或入多岐攝汝神將來舍無空未免勃蹊四十五挾勇必有機心能定而後能應用志不分凝神盡性以至於命四十六達理必明於權無權徒執厥中聖之愼其可與能權萬法皆通四十七陋巷不改其樂不違終日如愚離形超然自喪是名列仙臞儒四十八學人要明眞一先須識取根元根如木之根本元如山頂崑崙四十九陽龍氣中眞液陰虎液中眞氣兩者交通成和結成眞胎赤子五十兩箇壺中一景倒拽九牛上嶺上得嶺可長生失脚向門前等五十一金風吹坎中陽此是妙道出處有人二百餘歲至今行此一句五十二通天地人曰儒固要貫通佛老吕公亦是同人讀金剛經悟道五十三成就金剛種智其經秘密甚深昔人只悟一句無所住生其心五十四任意常在丹田温温保養下元别無施爲作用任者任其自然五十五學人要淨三業如龜藏護六根定中水火如透此眞眞外無眞五十六形鍊氣氣鍊神道集虚虚生白上下天地同流妙用六通四闢五十七十二玉樓申虎九重丹闕庚龍天光透崑崙頂罔象入水精宫五十八清淨無中既無圓覺幻滅亦滅超然與道合眞即是見性是佛五十九父泥丸母雌一能守一萬事畢元炁如如不動何勞嚥漱呼吸六十太上道一而已如來餘二非眞識取本來面目火患爲吾有身六十一玄牝之門甚祕橐籥造化胚胎明知不是口鼻高尚勇猛踏開六十二偃月爐最難尋高尚曾有此句只在此箇山中雲深自不知處六十三潜神游方之外自在與天爲徒浪說九年大妙都來片餉工夫六十四内丹須鍊外丹二者不可偏廢丹成更積陰功此人必定住世六十五睡則玉女分胎起來鰲魚擺尾炁定眞息乃長鑑明塵垢不止六十六西山有會眞記分别龍虎陰陽五識五補妙訣學者請細消詳六十七以陽養陽尚易以陰鍊陽甚難開天門閉地户衝夾脊透雙關六十八道高則輕富貴心淨可學神仙人我浪爭客氣逍遥自養長年六十九專意積精適神無使思慮營營虚無自然生道眞靜永保長生七十有動不動中動有爲不爲中爲形端而表自正德全其神不虧七十一至道大不容聲造形悟而默識入於不死不生浩劫天地爲一七十二象爲無象之象體乃無體之體存則百骸俱生亡則九竅皆死七十三天地萬物之盜聖人能明盜機害生恩恩生害要在審察其宜七十四悟藏穀俱亡羊掉史跖均失性藏乎無端之紀調以自然之正七十五日損損之又損資深深之又深靈臺無事生定切忌勞形悚心七十六後醒當懲前醉今是因悟昨非我生自有性命何人與論眞機七十七至道窈窈㝠㝠㝠㝠中獨見曉人皆背覺含塵誰肯迴光返照七十八由戒定生智慧自小成入大成悟太一含眞炁知肘後飛金精七十九上下三宫昇降收歛五炁同歸金烏搦得玉兔龜兒變作蛇兒八十乾以健而左旋坤以順而右轉八卦九九循環志滿神光自現八十一嘗聞知者不言吾今豈曰眞知多言曉曉不已姑爲學者指迷修眞十書雜著捷徑卷之二十
