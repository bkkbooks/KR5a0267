front:
  text: 修眞十書雜著捷徑卷之十七李三
  hash: sha256:934b01263f2358a23865a6a1065abc5acf75916f91887a6b7af02882cb82e8f2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_001-001a, image: hfl/0125/0125-004.png}
body:
  text: 翠虛篇泥丸先生陳朴傳九轉金丹祕訣一轉降丹二轉交媾三轉養陽四轉養陰五轉换骨六轉换肉七轉换五藏六府八轉育火九轉飛昇第一轉舌下兩竅通心兩竅通液四竅一轉之功似寳珠山河宇宙透靈軀紅蓮葉下藏丹穴赤水流通九候珠解曰内丹之功起於一而成於九一者萬物之所生也天一生水地二生火天三生木地四生金天五生土五行之序起於一故内丹之功亦起於一轉而成於九者九爲陽數之極數至於九則道果成矣似寳珠者言天一眞水藏於膽陰陽和合降而成丹初降之狀如露一顆明珠珠者珍敬其丹也且人之有身父精母血交媾而成此形交也丹之所降心火腎水交媾而成此氣交也故曰形交則生人氣交則成丹言其丹降之後神遊方外陰陽太和坐忘其形天地山河六合萬物皆在我身之内我身在天地萬物之外只覺心中一點光明乃是丹降也故曰山河宇宙透靈軀軀者身也山河包藏我身之内也所謂紅蓮者舌是也自兩竅通心兩竅通液人有病者則舌下津液乾而其眞氣耗一轉之首以舌閉其兩竅使眞氣不泄於外以通其神水也所謂赤水者心之液是也九轉之首每遇九日納息九次每一次納息九口自然津液通流自舌下而生以灌五藏故曰九候珠也望江南閉舌下竅通膽氣黄中寳須向膽中求春氣令人生萬物乾坤膝下與吾儔百脉自通流施造化左右火雙抽浩浩騰騰光宇宙苦煙煙上靄環樓夫婦漸相謀解曰天一生氣名曰中黄其氣藏之於膽以爲性命之根其味苦故人之膽氣味亦苦如草木之根華其味亦苦乃知萬物非生氣不能生也内丹之藥先閉舌下之竅内通膽中生氣至喉舌之間微覺味苦是丹氣流通然後汞水凝結而成丹也天地生氣萌之於春萬物得生氣然後能生人之得生氣藏之於膽人能通膽之氣然後内丹成就一轉之功如四時之春也生氣上行其中覺苦陰陽太和神居天外則天地四海亦在吾膝下浩然之氣塞乎天地百脉通流萬竅施張内丹降也造化言者其下手之初也先閉舌下兩竅不令氣泄於外其左邊之氣貫於左太陽而入腦右邊之氣貫於右太陰而入腦左右俱過腦而入頂泥丸宫合成一處下重樓十二環入心經傳入膽衝開膽竅使膽中生氣上行隨心膽之脉貫於舌竅覺舌有苦味乃是生氣注將欲降丹也然後閉定舌竅左右之氣上行故有騰騰之狀也膽竅既閉則生氣裊裊上重樓十二環自舌下之竅而昇滿口覺苦乃是生氣流通也夫婦者陰陽也夫者陽也婦者陰也生氣流通則陰陽大和心腎交媾故曰漸相謀也口訣行持下手之初先須飲食以和五藏不可飢不可飽心田安靜無憂無慮乃可入道凡於二更盡三更初當洗漱定神入室燒香盤膝而坐閉目存神候息岀入調匀以舌先倒捲定舌根兩竅閉息漸覺左右太陽經有兩道氣大牙根衝上貫二太陽次入頂門覺二氣交合即爲一次却閉眼良乆亦閉目依前捲舌候至泥丸宫止如此每夜行三次即止行至數夜或數日之間漸覺泥丸宫次流入腦下重樓十二環透夾脊串尾閭復次前衝心貫膽臍胃中温温微覺意思和暢乃眞降也如此後則數夜漸覺氣到心次微覺温温或心頭氣漸動却有温氣從心而上過重樓口覺微苦是中黄氣自膽而岀陰陽大和將有降丹之象如此之後每夜行持之初令一人在門外攔人進入及猫狗等恐忽然相驚至每夜行三兩次時於坐前横一几忽然氣衝覺身體漸大精神騰騰漸見屋舍人物山河皆在我身之内手足皆不知所在次急以手按凡閉目大覺心頭微一塊光明團圓如日忽然墜下丹田此乃降丹也丹降之後未得便開眼且漸漸收拾精神歸定四體復舊或手足覺麻痺次候定醒然後開眼次喫人參湯睡至來早喫粥食將養一二日如丹降也丹降之後百病消除更無疾苦之厄也第二轉二轉陽成始結陰腎光心液合丁壬神珠奔電歸東海時迸靈光照紫金解曰二轉之初如人懷胎兩月胎之初降乃是眞陽之精神爲丹心屬火爲陰以配南方丁火丁者火之陰也腎屬水爲陽以配北方壬水壬者水之陽也吕曰火取南方丹鳳髓水求北海黑龜精故於二轉則養陽使心火之光感於下三轉則養陰使腎水之液交於上眞水眞火上下以配丁壬抱養眞丹以成造化凡丹之初降養於心育之以眞火生其丹也一轉成功則丹從心絡流下藏於丹田育以眞水此二轉之功也丹藏丹田之後靜坐虚室中忽然時有光明從胎照見如金團乃月光而也望江南玄珠降丹窟在中宫九候息調重九數赤波或迸太陽東心腎遂交通逢六變重六息陰功火自海門朝帝坐水從蓮萼佐丁公紫電透玲瓏解曰玄珠眞丹也一轉之初丹降於心絡中故云丹窟在中宫凡降爲一轉丹降之後凡遇九日則閉息九候爲一次至九九八十一爲九次故曰重九數九九功成眞陽丹足自心絡流入丹田丹藏於水府養其陰太陽東者海水之府象丹田腎水也丹之神藏於心以養眞火丹之轉歸於腎次養眞水水火既濟陰陽大和故曰心腎交通二轉之功成其三轉之初也逢六則閉息六數爲一次六六三十六爲一周以養其陰故曰重六息陰功海門是丹田腎府也眞丹藏於丹田丹陽之數以足每到日中則神自丹田熱氣達之於上而朝於心帝坐心也蓮蕚舌也六六内陰數足則下蓮池神水澆心絡以養丹氣故曰佐丁公丁者心之火也此眞水眞火以成既濟之功陰陽既濟眞丹氣足時有神光出於面目夜半安坐内視藏府表裏分明直見玄珠養於丹田故曰透玲瓏口訣丹降之後一轉了畢凡遇初九十九二十九日亭午時靜坐虚室中盤足瞑目端坐叩齒九通神交氣通然後閉息每一閉入九息爲一次開眼良乆再閉息如前九息爲一次初閉時一次二次行之漸熱閉五次又極熱用之九次一向行之直候内之火候用足與天地相應不以遠近或前入息至九心中温熱四神和暢心神揺動一道熱氣下丹田爲二轉功成自此以後不行九息之數第三轉三轉行陽入左宫玄珠胎色漸鮮紅神明育火分形像天籟時催造化功解曰丹成三轉逢天行陰以養眞陰之氣内陰數足丹入丹田流於左肋四體汗流以制尸氣三轉功成自此更無三尸魂也靈珠内丹也此後陽氣充足凡便及涕涶皆粉紅色以應純陽之質及其丹光照見一顆明珠如火輪之狀在左脇之下三轉數足每遇月盡以左手摩頂入息激動丹火至五藏熱爲上謂之育火以運其丹此後丹田中漸覺有物遇入息則丹動故云分象也天地和則撼激有聲是名天籟人之九竅不通不聞其聲三轉之後九竅聽明天籟之聲晝夜常聞也望江南毛髮薄三轉運行陽胎色漸紅陰漸縮推移歲運助陽剛育火養中央成物象五轉辨微茫出入尚遲形上小晨昏時飲玉壺漿天籟奏笙簧解曰三轉陽數足故陰龜漸縮腸胃漸繖一月之中大小便共有十次漸入地之位將成無漏之道乾卦皆陽象純陽也摩頂入息内育其火丹抱聖胎將成形象五嶽未全八轉動其形如三四寸之小兒見之未甚分明也陽氣方足而未嘗育陰聖胎有魂而未嘗有魄故出入尚遲形尚小也聖胎成像坐息之間常見面目光彩湧泉甘露之水常出飲之七竅聰明則聞仙樂也口訣丹入左脇之後功成三轉凡每月初六十六二十六三六之日夜半子時洗漱了入淨室中端坐盤膝叩齒六通凝神定氣閉口入息六次爲一候如此六遍乃畢其月内行至三六日則月中三遍俱足至月盡夜半子時依前於淨室中閉目盤足而坐先以左手摩頂門右手摩尾閭骨脊盡頭隨月轉七七四十九轉凡摩時緊閉定息至數足微歇候氣定再摩如此三次自覺心腎之氣交於中膈微動丹氣塞於五藏覺五藏中其熱如火乃行火之候也或於三六及月盡之時忽覺丹在左脇之下揺動微有一道熱氣過丹田直入脇下其熱如火揺動乆而後定乃成四轉之功自此之後不行重天之數也第四轉閉陽户鼻天竅口地竅之氣四轉行陰入右關聖胎靈運發朱顔圓光滿室神無碍鼓樂嬉遊去復還解曰左屬陽右屬陰四轉之後内丹在右以應内陰之數自此内之陰陽俱足三轉養陽聖胎生魂四轉養陰聖胎生魄丹之四轉内之聖胎魂魄皆就其五嶽精神與我内貌則同此出神之眞身也四轉之後陰陽氣足正坐閉息内之神光從頂門而出如一輪明月罩定身體神遊方外出入無碍坐室見四海而知吉凶望江南丹已返四轉運行陰逢六閉藏陽户氣三關全透合丁壬龜遊任浮沉時出入無碍貫他心遊戲神通常出面圓光周匝繞千尋寒暑不相侵解曰四轉養内陰丹藏於右脇鼻爲天竅口爲地竅氣之鼻出屬陽氣之口出屬陰三六之夜閉定鼻息絶其來去之息陽氣内降充塞五藏此以陽養陰也閉住鼻竅則華池水滿下沃心絡水火内交心氣下降腎氣上騰丁壬配合聖胎陰陽數足丹在右脇隨氣升降如龜在水任意浮沉内丹光明罩我之身其狀如月寒暑不侵我心與他人心相通知其善惡嬰兒出入遊戲四海名登仙籍也口訣鼻竅口竅其丹入右脇之後養成四轉之功遇每月初六十六二十六夜半子時洗漱了入靜室閉目盤足而坐叩齒三十六通集神定氣閉定鼻息湛然不動直候眞氣内丹田氣貫舌竅者華池津湧滿口將欲溢岀然後款款嚥之歸心其神水到心則激神火五藏覺熱遍身汗岀四體甦暢爲一至三元之夜如此行持三遍即止此爲神水神火抱育元精抱育之後或於行持三關内丹自脇其聲如雷一道熱氣入於丹田鼻中火光射岀於是内丹復歸丹田以成五轉自此不行閉陽户之法也第五轉五轉陰陽造化成嬰兒盈尺弄陽精寐遊四海寤知所去住無爲信步行解曰四轉養内陰三轉養内陽五轉内外陰陽數足造化之功已成養就聖胎神通自在故曰造化成也五轉之後内丹聖胎養就靈軀身長尺餘自此採日之精以養外陽奪天地造化之功也常人内無所養精神四散而無歸著晝則神在於心夜則神出於體及其睡著神無所守更不知有身亦不知所在隨魂隨魄入幽趣之中與鬼同聚於夢中無一不見四大物壤神從鬼往隨福受生天堂地獄皆不由己乃神不識其身隨波逐浪之形也得道眞人内丹成就神合於身物不能誘是故魂魄潜伏萬邪不干更無憂慮出離生死皆由於我出神入神縱横莫測故丹經頌曰眞人無夢此之謂也得道眞人神無所滯魂住在我信步無碍也望江南珠自右紫電入丹城内養嬰兒成赤象時逢五轉採陽精火自水中生燒鬼嶽紫電起崢嶸隨意嬉遊寰海内寐如砂磧卧長鯨時序與偕行解曰五轉功成陰陽數足内丹玄珠忽自右脇一道眞火飛入丹田聲如鼻光如火乃是丹珠内陰内陽皆復丹田以成五轉之位也聖胎之内眞人成就出入頂門長尺餘也三轉養陽四轉養陰内之陰陽皆足丹田功成五轉則奪天地造化採日之精以成外陽修行之道自内及外其序之順也故自五轉之後於一月之内逢三九之日採日月之精以養聖胎也行持之法以水求火以陰求陽水火既濟陰陽大和故曰火自水中生常人於丹田之下積陰之氣謂之鬼嶽遍體純陽陰山鬼嶽燒蕩陽宫神庭建立吕先生曰燒山符子鬼難看此之謂也隨意出神遊行四海去住從己所欲也寐識其身寤之其所運神出身自觀本形如長鯨卧於砂磧也五轉之後造化功成與天地合德日月合明内丹造化與時偕行口訣内丹復入丹田五轉之功成就内之陰陽數足當採外之陰陽以成大道凡遇每月初九十九二十九三九之日當日正午之時面南盤膝閉目對日而坐候氣定絶鼻息使氣無往來眞陽不泄充滿於内其内眞火交通自覺一身上下通紅光明滿室一二刻後漸漸丹田眞水一道冷氣一直上貫於心如水精九浮在心上然後閉目開息從鼻中吸之吸氣九九八十一口納之於心其日光到心之後漸覺心頭氣動在丹田如魚踴躍乃是陰陽大和至八十一口而止如此行持三年而畢三載後不採日精却採月華也第六轉日有五色三年月有九芒一年六轉丹田弄月華變胎魂魄影潜賒陽砂换骨陰消肉换盡眞如玉不瑕解曰丹至六轉内外陰陽皆成聖胎全眞眞人與内身一體每遇月圓之夜採月之華以積其陰故曰弄月華也五轉眞陽全魂化爲神六轉眞陰全魄化爲氣魂魄内外全日中遊行更無其影與日純陽爲一自此之後鬼神不可見陰陽不可測以成其眞仙之道故曰影潜賒也人之凡胎濁骨陰陽不潔不能上昇得道眞人丹成四轉之後至五轉採日精納丹田結爲陽砂丹砂内結入於骨髓隨汗而消也故曰陽砂换骨换骨之後至六轉採月華納於丹田結爲陰粉採月華一年之後其陰粉内化入於内中以養仙肌但覺大小便常有血隨尿出乃是陰消凡肉仙肌自生故曰陰消肉也玉之有瑕不成眞玉人之凡胎濁骨不成眞人六轉之後换其凡骨亦生仙骨去其凡肌而生仙肌换盡無瑕神仙純一望江南日精滿陰魄化無形每遇月圓開地户神龜時飲碧瑶精清潔復如冰陽砂赤陰粉色微青粉换肉兮砂换骨凡胎换盡聖胎靈飛舉似流星解曰陰陽數全魂魄内外體無形影乃登眞人之道六轉每遇十五月圓之夜運北方腎水交南方心火使内外水火既濟以結陰粉與天地造化流通以育聖胎之質神龜者腎水中龜也吕先生曰飲海龜兒人不識燒山符子鬼難看乃謂是也採月之英華納於神水之府其神龜飲之清潔如玉冰冷如成陰粉生於北極之中故象其龜也陽砂者日精所結故屬於陽其色赤亦象其日陰粉色月華所結故屬於陰其色青青者象於月也骨肉换盡則胎内化肌骨皮肉皆無盡化仙質魂化合神魄化合氣悉皆清凈一體之中形神俱妙與道合眞學道之士能全其神未能换其形爲形所累故出神則身不能動尸假則形不能忘丹成六轉則换凡形而成仙質形神俱妙神之所向體亦隨之上昇九霄如雲如星之快也口訣丹成六轉採月之華每遇月圓十五夜半子時洗漱畢對月而坐閉息合口絶往來之息使眞氣不泄於外内之眞氣充塞於六府腎之眞陰與太陽之精内外之眞氣瑩若水精湛然明朗一二刻間腎之眞水感動於心火心神之火一道熱氣降入丹田如一火輪安在琉璃盤内然後款款開目放息鼻中對月吸月之氣納於丹田吸八八六十四口而止吸氣一半之後其月華眞陰激動丹田中眞火水火相濟如沸湯之狀四體汗出百脉甦暢至六十四口而止始此行持三年了畢其功入七轉之位也第七轉七轉身飛四體輕靈光閉息滿丹城千朝却粒生成火坤户施張浴海鯨解曰丹成六轉陰陽内外俱足凡骨换爲仙骨凡肉换爲仙肌四體百骸並無凡物仙體輕清飛舉自然也内丹點就神骸故一身之體爲之减也丹之七轉使陰陽内外和合當閉十朝以成妙道之用也丹成七轉閉息千朝使陰陽大和千日數足神氣合會五藏皆新内外純一丹光明徹於六府眞火燭開於五内藏府谷蟲化而爲水自此腸胃充實不著煙火之氣不納煙火之食飢餐仙果渴飲瓊漿與世不類也内丹皆化之後陰莖消盡惟有一竅名曰坤户以象其陰每遇神丹火盛則於三九之日投身水中運其丹珠從坤户而出吸呼弄水游戲自在一二時乆復運其丹歸於丹穴以制火之盛也望江南形透日七轉任飛騰幽靜深巖圖宴坐息無來往氣堅凝却粒著其能生成火返本氣澄清九候浴時開地户月中取火日求冰五内换重新解曰七轉之後形神俱妙内府皆爲仙器日中遊行身體通明色如紅玉飛舉騰空縱橫任意大抵須要内外和順使之日月光華會於心腎水火陰陽交通神氣和會深入巖谷之中宴坐千百日閉鼻息以絶呼吸之氣冲和凝定然後内實不食塵世之物以證逍遥之道也至於却粒不食眞奇功奇道也閉息千日神火内發蕩洗穀氣更無食念返本還元抱一守靜故曰遺返氣澄清凡遇神火五藏發熱則逢三九之日入於水中澄其眞丹光明如火輪之狀從地户出故曰開地户月者陰之象也神火至陽之物也户者陰之竅通陽光從地户陰穴而出故曰月中取火也日者陽之象神水至清之物也舌者陽之竅通流神水從舌竅陽穴而出故曰日求冰也五轉换骨六轉换肉七轉换五藏五内者五嶽也故曰五内换重新也口訣丹成至七轉當離塵世入深山之中或巖谷間宴坐閉息精神口鼻絶往來之息使眞陰眞陽交於腹奪天地造化之功歸於四體千日之後五藏换盡胎氣變爲仙府但覺頂門竅開出黑赤之氣乃是胎氣發散千日數足頂門竅合乃是胎氣出盡七轉功滿也自此之後五藏結實不納煙火若有時五藏丹火發則入水中閉定鼻息使丹珠神火從地户而出浮於水面如牛弄黄直候舌下神水如泉則丹火息吸其丹珠復入地户直至八轉地帶成就無火毒則不復浴也第八轉八轉還元地帶垂周行胎息養嬰兒有時火發燒丹窟深入寒泉弄赤龜解曰嬰兒在母腹中胞胎裏定氣不能出入而無所損若嬰兒臍中有臍帶銜在口中呼吸之氣往來不絶此乃自然胎息故無損也丹成八轉之後换於臍中生一臍帶亦如嬰兒之狀遺其本始之道故曰遺元地帶垂也嬰兒得臍帶行胎息之氣故無所損眞人得地帶行周天之氣故能長生也赤龜丹珠也八轉之後内鍊眞火使無熱毒之患凡遇火發即口銜地帶閉息九日至第九日眞水自丹田如湧泉泛漲直至重樓十二環丹珠在其神水之中如龜之戲水自此之後眞火無毒更無丹熱之患故曰有時火發燒丹窟深入寒泉弄赤龜望江南内外變八轉始還元地帶長垂主坎户周行胎息貫天門太始道方存純一體赤黑氣常噴丹火發時燒内景冷泉湧處浴猴孫神水赤龜吞解曰丹至八轉外之形體内之五藏盡底换變復生地帶如小兒之狀故曰返本遺元也地帶者臍下之帶也生於臍中屬北方坎卦故曰坎户天門華池之竅地帶貫於口中行周天之息以調火候故曰周天息也太始之道生天地之始丹成八轉如天地造化之初也内丹純陽也無一點陰氣故曰純一體也黑赤者神火之氣也丹成八轉自心而來常從鼻中出入常見黑赤二氣故曰氣常噴也丹火之患運神水以制之更無丹火之候蓋丹者心珠心家猴孫也赤龜火神也丹浮於水之中如龜吞水取其狀也口訣丹成八轉地帶生於臍中若遇丹火猶發熱五藏熱燥即閉目宴坐以地帶接於華池之下使息氣内通流行周遍運用之道自閉息之後丹田眞水日日漸長至第九日神水直至重樓十二環丹珠隱於神水之中出去火毒自此之後更無發燥之患至第九夜子時閉息吸神水從泥丸宫過夾脊復丹田以畢其功也第九轉功行畢九轉逍遥道果全三千功行作神仙金書玉簡宣皇詔足躡祥雲謁九天解曰丹成九轉造化成就道果圓成更積外行三千外果圓滿方可飛昇故許旌陽丹成之後除蛟龍之害然後上昇孫思邈丹成之後救萬民之疾然後上昇皆須立功成名方得上昇也上昇之日天樂來迎簫韶合奏以過天關隨功行分職列爲仙班與天地相爲長乆也修眞十書雜著捷徑卷之十七
