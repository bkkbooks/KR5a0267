front:
  text: 修眞十書雜著捷徑卷之二十三
  hash: sha256:b8745b8cce2efa025a93ffdb8e30c1330dd0813835783e68e5990f02a86e9dc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_005-001a, image: hfl/0125/0125-140.png}
body:
  text: 臨江仙曾慥子後寅前東向坐㝠心琢齒三十六通鳴鼉鳴天鼓三十托天三次每次行嘻字氣回顧握固按腿左右各三先右次左左行嘘字氣右行呬字氣也眼光摩挫按手摩眼七次閉目轉睛七次以中指節捻太陽三十六張弓左右二三十挽每次行呵字氣仍踏弩左右各三次每次三挽七踏行呵字氣升降轆轤多左右運轉轆轤三十六行吹字氣三度朝元三次每次按腿閉目咽氣名爲朝元每次行吹字氣九度轉想氣自丹田轉九交背摩盤足閉氣搓手熱摩擦腎俞上下行吹字氣雙擺按腿瞑目閉氣三右摇擺身不限數名鰲魚擺尾行呵字氣扳舒脚以手低頭扳脚行呵字氣拏跪膝反手左右拏脚跟三次每次行呼字氣虎龍交際嚥元和以舌攪取津滿口嗽三十六一氣分三嚥想至丹田中如此三遍行吹字氣浴身鼻引清氣閉住搓按兩手極熱遍身擦令微汗出挑甲罷左右臂舉手齊發遍挑十指甲不限數便可躡烟蘿凡行吹腎呵心嘘肝嘻三焦呬肺呼脾六字不可令耳聞聲出氣欲細而長凡行持皆閉氣行持罷方吐氣出呼所行字鍾離先生八段錦吕公手書石壁上因傳于世其後又有竇銀青八段錦與小崔先生臨江仙詞添六字氣於其中恨其詞未盡予因擇諸家之善作臨江仙一闋簡而備且易行普勸遵修同證道果紹興辛未仲春至游居士曾慥記滿庭芳何鉏翁二氣旋還三宫升降往來於是無窮透關神水鉛汞過三峰返復周流八脉戊己鍊陰虎陽龍凝情處金光朗朗身外見形容靈光眞造化天機深遠推測難通筭利名酒色恰似秋風大道玄鑪進火三田内養出神功功成後金書來詔平步赴瑶宫永遇樂四首箇箇修行人人嚥納誰悟眞道曲徑多歧旁門小法誤了人多少容成豈是神仙究竟採藥謾多鑪竈忽一朝脱却桶底性根壞倒爭如内觀無爲清淨學取本來莊老匹配陰陽抽添鉛汞八卦爲端表人生如夢流年似箭回首也須聞早貪迷戀春花秋月甚時是了右一萬法由心應觀法界一切心造老子瞿曇同歸去揆不離心是道自從識得坎離交濟鍊藥粗知昏曉雲騰雨飛蟾宫兔走丹闕更無煩惱氣中眞液液中眞氣和合不多不少種出黄芽鍊成赤水龍虎交圍繞九還七返工夫到後還我舊時年少待三千功圓行滿恁時是了右二學道修心存神鍊性直要輕舉補腦還精流水不腐户樞終不蠹日魂月魄摶歸鑪鼎眞炁自然留聚把心猿縛住意馬追回迥無塵慮定中明有陽龍陰虎水火透時爲度八段奇文千口活法向上有一路吕公高尚未離人世有分也須相遇約十洲三島驂鸞跨鶴大家同去右三養水養精養神養血先須養氣日月陰陽六爻八卦細看參同契靈軀靈寳千言萬語不過坎离兩字向崑崙嶺上返本還元要明終始一身雖小如同天地八萬四千餘里玄牝之門生生萬化都在沖和内此眞眞外别無眞諦方信道一而已異時見鍾吕如有未明請師指示右四世間有道人以旁門小法迷誤學者有二三名公自云人生豈不擘畫得活數百歲爲房中術自以爲莫已若桶底一旦脱去性根墮落追悔何及東漢載冷壽光學容成公御婦人法年可百五六十歲鬚髮盡白而色理如三四十時亦不免於死壽光尚爾况不及壽光者乎予作永遇樂四詞因勸世人迴光返照直深戒爲容成之術者庶幾覺悟聿修清淨無爲之地方爲究竟漁家傲四首至道不遥只在邇毫釐差失如千里道是難來元却易如相契一超直入如來地水火交時爲既濟三尸六賊都回避只此長生仍乆視身口意化成一點沖和氣右一神是性兮氣是命神不外馳氣自定幸有崔公入藥鏡如究竟全眞固蔕歸根靜主客内明方外應靈臺粲發天光瑩兩箇壺中一片景急修省莫待臨渴去掘井右二精養靈根神守氣天然子母何曾離晝夜六時長在意三田内温温天地中和水十二樓前白雪膩九宫臺畔黄芽遂日月山頭朝上帝神光起騰身直出烟霄外右三我有光珠無買價光明常照芝田下更没之乎並者也知音寡世間誰是能行者一萬精光渾守舍四百四病都齊罷透出火龍歸造化回仙駕更無一點塵隨馬右四促拍滿路花三首抱元能守一四大自輕安心中須返照幾曾閑金烏𠾑耀飛入爛銀盤心心心是道只在心心更於何處求仙又何須衣冕燕處欲超然榮華能幾日便凋殘修眞甚易積行累功難勸君强爲善五濁三途便爲雲島神山右一人能常清靜天地悉皆歸一眞含衆妙入希夷昭文不會氣候有成虧妄心寂滅盡困睡飢飡更無作用施爲自然鑪鼎就光彩透簾幃玉池神水湧上生肥如人飲水冷暖自家知自家性命事自家了得自家性命便宜右二若論修養事知有幾多門諦當歸宿處是靈源至眞至道簡易合乾坤坎離并水火止是筌蹄粹然一點長存箇中如薦得悟了五千言金晶飛肘後透崑崙清江九曲一棹破烟昏水擊三千里九萬鵬程化成元是冥鯤右三修眞十書雜著捷徑卷之二十三
