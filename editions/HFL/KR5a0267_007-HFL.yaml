front:
  text: 修眞十書雜著捷徑卷之二十五
  hash: sha256:cbcb3a63c4a5eed306b2c9df624eb0b55a50709dda35604425c763f979397f3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_007-001a, image: hfl/0126/0126-018.png}
body:
  text: 天地交神論夫道者虚無自然安靜無爲豈可學飄風暴雨而不得長乆也和炁交並而甘露降萬物蠢然而生乃天地自然之道以合聖人之機是長生之本也夫愚人之性豈解聖人體道之深機恣縱無窮之慾消磨有限之身致與大道懸隔依前不免輪迴遷軀换殻豈不錯乎夫人身中以心比天以腎比地肝爲陽位肺爲陰位心腎相去八寸四分其天地覆載之間比也炁比陽而液比陰子午二時比夏至冬至之節卯酉二時比春分秋分之節以一日比一年以八卦時比八節子時腎中炁生卯時炁上到肝其炁旺陽升以入陽位春分之比也午時炁到心積氣生液夏至陽升到天而陰生之比也午時炁中液生酉時液下到肺其液盛陰降以入陰位秋分之比也子時液到腎積液生氣冬至陰降到地而陽生之比也日月循環周而復始若能保養内守無損無虧自可延年夫積陰陰過則露爲霜而雨爲雪積陽陽過則霧爲烟而雲爲霞陰中伏陽擊搏而生雷霆陽中伏陰其堅固而生雹霰陰陽不合相對而生閃電陰陽不正亂交而變虹霓天地運化五行後立成萬象之初形化四生之體擇其中勝達莫若於人志能學於先賢可以增於命禄乃依經録出每年迴忌之辰凡一年之中七十二日外有六日庚申六日甲子六日本命一日生日可精嚴記耳爲妙是以諸神擁護五炁盡惣朝元凡五辛三厭不可食之夫五辛者曰葱曰韭曰大蒜曰小蒜曰園荽是也三厭者天厭鴈地厭黑鯉魚及牛與龜鼈大忌食之令人病多凡戊戌戊辰戊寅戊申戊子戊午日並不得燒香凡日中不得面南小遺夜間不得面北小遺人生天地之間本終於天壽若不知迴忌之辰而有萬死之因非天地之所殺乃人所自殺也逐日戒忌之辰正月一日天中節會之辰五日人之五神集聚之日七日眞武下降之日八日南斗星君下降十三日三元集聖日十四日三官下界十五日三官朝帝十八日三元内奏日十九日五瘟作病二十二日三尸神上奏福之神已上日宜將息二月二日天正節之日六日中神慶生之日八日眞武下降三元眞君朝元十五日玄元道祖聖誕春分二月中氣忌色慾五日爲六氣方傳二氣到肝忌酒色之事三月三日玄帝降生之日四日文宣王降生之日九日眞武下降之日二十一日天猷下降二十八日東嶽聖帝誕日已上冝戒酒色四月此月純陽月宜戒色一月七日心腎一氣拔給之日八日佛生之日小滿四月中氣外陽而内陰三氣到膽之時可以將息保命長生五月三日天正節之日五日天毒節日眞武下降七日天地二氣感托之辰十六日天地二氣交造化萬物之日最宜忌酒色二十二日中明王生日二十七日天地相雜二炁分形大忌酒色夏至人一炁在心且戒色六月六日掌府慶生之日注死之辰大忌酒色之事七日眞武下降之日八日天元甲子將會六下遊世界之日大暑六月中氣四炁到胃且宜將息可以長生忌色五日恐損胃氣二十四日天元甲子朝元此日冝燒香夜面對東斗拜並宜忌色慾七月七日道德臘日五帝校定生人罪福眞武下降南斗下降西斗下降九天應元保運眞君降現浮丘超應眞君上昇王子喬眞人飛昇西王母降現麻姑大仙降現十五日中元令節天眞朝元日七炁地官主録百司上詣天闕進呈世人罪福之籍宜齋戒燒香念經深發善願可以超度祖玄延年益筭十九日天猷眞君下降二十四日翊聖眞君下降北斗星君出遊三十日土府太歲尊神出遊檢察人間禍福善惡之日已上宜禁忌八月十三日眞武下降十五日太陰朝元之辰宜守夜燒香秋分藏月中氣五氣到肺宜戒色五日二十七日諸佛慶會東海傳經之辰二十八日四天奏事辰天河歸元日二十九日大陰滿月色變形萬物感其陰氣造化之辰已上宜禁忌九月三日五瘟生日五方五瘟會於廣山此日大忌酒色九日玄帝冲舉點檢人間善惡十六日天曹諸司傳録生死名姓宜夜明燈供養十六日日月宫陰陽宫會合之辰諸天宿曜上朝元始分地分各照宫位之辰北斗天帝下降人間計筭命籙善惡事備香燈夜深朝北供養忌酒色念經呪一夜燒香守夜則萬邪不能干矣十月一日東皇大帝生日五方五帝奏會之辰三日四海九江三元水府諸王百官龍聚奏水府宜點夜燈六日天曹諸司五嶽五帝降生之日十五日下元水官下降點檢人間善惡宜燒夜香供養小雪十月中氣六氣到大腸宜忌酒色五日三十日内六陽外六陰陰中陰萬物皆死十一月七日眞武下降十七日掠剩相公下降此日切忌酒食十九日翊聖眞君下降二十三日南斗注生奏生之辰冬至日一陽住在二陰中切須戒色不患天行十二月八日佛成道之日十三日天元太一朝元之日十八日北斗下降人間奏事之日二十七日眞武下降之辰大寒十二月中氣一氣在膀胱且宜忌酒色五日甚妙若不戒忌四日必患疾病二十九日三界上眞勝遊之日已上日大忌酒食六字氣歌訣行持六字氣次第爲君歌托嘻顧嘘呬張踏並同呵三吹居其中升降與朝摩擺扳呵再詠拏呼獨一哦誰知嚥復吹妙理畢陳羅大都十二聲五臟可通和至游居士座右銘即心是道道不離心與即心是佛同以下爲基修飬究竟在於還精補腦當以丹田爲基本故曰高以下爲基也如人飲水冷暖自知三田之内冷處欲其暖暖處欲其冷他人何與焉獨己自知身不愁念起只怕覺遲一念起如速覺寤即念隨覺滅念捷不自覺悟即殆矣懲忿窒慾銘諸肝脾修養所戒者忿慾二事損失眞炁其害甚大懲忿銘諸肝者以怒屬肝也窒慾銘諸脾以脾主意也詠道詩九轉神精返上元河車般載運周天大道不離方寸地一條徑路過三田修眞十書雜著捷徑卷之二十五
