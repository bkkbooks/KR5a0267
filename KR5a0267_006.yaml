front:
  text: 修眞十書雜著捷徑卷之二十四二十五同卷李七
  hash: sha256:5b7244f9df93078ca651820e3a29f143dc4039d84e9157ca21c4ea080c8afcdc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_006-001a, image: hfl/0126/0126-004.png}
body:
  text: 太上傳西王母握固法正身端坐想心中紅日輪如錢大稍暖從左脅直放下丹田下左足心稍暖又存火從下燒上臍下丹田漸漸方過右足又候脚心稍暖從下發火燒至丹田便從右脅上過胸直從降下直至下丹田又從下丹田放上心頭照見五臟此乃上則爲降下則爲升則天地升降之法便直放下丹田下膀胱中穿過尾閭關鑿開雙腎取兩道白氣從夾脊直上泥丸分作三路直上頂門候囟門稍暖又想珠從鵲橋内放下口中慢下放過重樓十二環到中宫神水滿則分作三口下中宫又存膀胱中有黑氣一道湧上心頭方閉目收神入中宫候眼前有報應或目前如金花或如白絹隊隊過或是滿室之光或是隔窗之光能見小字就此光中千日之内可出陰神或乃縁一年七十二候足便可出神也抱一說道生一一生水水生精精者一物也抱一則與精合脱一則與精离精生而氣全氣全而神全神所以制魂定魄精者天地萬物所由生成之然精常管人而人常費之竅漏無度至於中乾以死死則非离也非精离之人自离之耳莊子曰不离於精則謂之神人故管精則失靈沉爲下鬼矣而有能全之者是豈尋常所能至哉保精神精者神之本氣者神之主形者神之宅也故神太用則歇精太用則竭氣太勞則絶是以人之生者神也形之托者氣也若氣衰則形耗而欲長生者未之聞也夫有者因無而生焉形須神而立焉有者無之館形者神之宅也儻不全宅以安生修身以養神則不免於氣散歸空遊魂爲變方之於燭燭盡則火不居譬之於堤堤瓌則水不存矣身勞則神散氣勞則命終形瘦則神斃神斃則精靈遊矣已遊者無返期既朽者無生理故神者魂也魄者陰也神能服氣形能食味氣清則神爽形勞則氣濁服食者千百不死故身飛於天食谷者千百皆死故形歸於地人之死也故形歸於地人之死也魂歸於天魄落於泉水火分散各歸本源生則同體死則拍捐飛沉各異稟之自然行者譬如一根之木以火焚之烟則上升灰則下沉亦自然之理也夫神明者生化之本精氣者萬物之體全其形則生養其精氣則性命長存矣三茅眞君訣神養於氣氣會於神神氣不散是謂修眞子不離母母不放子子母共守長生不死吕眞人小成導引法凡欲修養須淨室焚香順温凉之宜明燥濕之異每夜半後生炁時或五更睡覺先呵出腹内濁氣或一九止或五六止定心閉目叩齒三十六通以集心神然後以大拇指背拭目大小九過兼按鼻左右七過以兩手摩令極熱閉口鼻氣然後摩面不以遍數爲眞人起居法次以舌柱上腭嗽口中内外津液滿口作三咽下之令入胃存胃神承之如此者之作是三度九咽庶得灌溉五臟光澤面目此雖旁門亦極有力不可輕忽存想咽氣下丹田在臍下三寸近後有二穴通脊上泥丸宫每之連咽速存下丹田所納得元氣以意吹之送之令入二穴因閉目想見兩畔白氣夾脊歷二十四節過三關雙引直上入腦泥丸宫謂之上丹田熏蒸諸宫森然徧入毛髮面部鬚擘手指一叶而下入胸中至中丹田中丹田者心也想氣灌溉五臟仍歷下丹田達湧泉穴湧泉者足心也所謂鬱蒸肌膚通帖首脉分一氣以理之鼓之以雷霆潤之以風雨之類也亦猶天地有泉源非雷霆動作則無以潤萬物人身上有津液非灌漱則無以滋五臟發光彩還精補腦不死之道名内藥非吐納則不能引而用之是知回環之道運用之理蓋所以法天而象地想身中濁惡凝滯邪氣瘀血皆被正氣蕩滌從手足指端出謂之散氣則展手指不須握固如此一度即是一通通則無疾復調之使平復鼓咽如前也閉氣鼓咽至三十六謂之小成若未絶粒理且至此常須少食令腹中曠然無問坐卧但腹中空則咽之一日通夕至十度自然氣通至三百六十嚥謂之中成至一千二百嚥謂之大成是謂大胎息也如小胎息但閉氣數止一千二百亦謂之大胎息若不能鍊形易骨縱得長生兀然同枯木無精光也明耳目訣常以手按兩眉後小穴中三九過又以手心及手指摩兩目顴上以手旋目行三十過唯合數無時節也畢輒以手逆乗額三九過從眉中爲始乃止入髮際中口咽液多少無數也如此常行耳目聰明養生延壽論一日之忌暮無飽食一月之忌暮無大醉一歲之忌墓無遠行終身之忌暮常護氣乆視傷血乆行傷筋乆卧傷風乆立傷骨乆坐傷肉乆語傷氣多思則神怠多念則志散多事則形勞多語則氣急多笑則傷臟多愁則心顛多怒則傷脉多喜則傷血多樂則氣溢多好則迷亂多惡則憔悴夏不極凉春夏卧東首秋冬卧西首先飢而後食先渴而後飲太渴氣不行太飢氣不藏太飽傷肺太飢傷氣鼻多引氣口微吐氣枕不欲高唾不欲遠人欲勞不欲大疲春夏腦足俱凍春夏早卧臨起欲出氣少欲入氣多秋冬温足凍腦行走功語則失氣寢食不語語則傷臟春不可薄衣令人傷寒霍亂不消食頭痛春冬未半衣欲下厚而上薄春冬之初皆服一服轉瀉藥則不染天時之氣冬月天地閉血氣藏人不出汗發洩陽氣損人每旦夜令人搯脊及捻四肢頭項無時行之疾不能染矣旦朝以兩手相摩令熱尉脊三次且語勿唾先叩齒二七次方起琢齒一七次如此者乃名鍊精且未起漱津令口滿力吞之且起洗面勿開目令人失明目澀多淚凡食訖以手摩面令津液通流凡飽食欲少而數令飢飢中飽飽中飢凡食訖忽精思營爲苦事促壽濕衣汗衣不可乆着凡心有愛不用深愛用深憎並傷神損壽三十以下勿食補藥四十以上勿食瀉藥人患熱者大吹五十遍細吹一七遍人患冷者大呬五十遍細呬十三遍乙言吹呬等字並以須聲氣似字髮血窮也千梳以理血氣也莖髓窮也善固以益其髓也耳由窮也數揉拔以實也舌氣窮也少語言以養氣也齒骨窮也數叩琢以堅其骨鼻常去其中毛謂之與通天氣爪筋窮也勿數剪以全其筋氣也寒食傷腸熱食傷胃春夏可以居其山高明故順氣而疾不生也納津法以舌柱上腭覺口内外液自生嗽滿嚥會神口凡納時正坐存心下有一孩開口方致之修眞十書雜著捷徑卷之二十四
