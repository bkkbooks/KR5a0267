  text: 修真十書雜著捷徑卷之二十一
  hash: sha256:2ae20e8ff4263f243e01c8beb2fe907a6f659298f416cbdb09f752a9ea9e07b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0267_HFL_004-001a, image: hfl/0125/0125-108.png}
body:
  text: 西嶽竇先生修真指南無知子問林屋逸人曰雖知道在虛無之中而未識虛無之境人居生死之內而未審生死之門欲願明其理以指示仍使後學以聞焉逸人答曰求虛無者當須內觀求於外者去道遠矣我嘗念昔有五公子問太上虛無之地太上曰虛無之地有五城門者乃子五指間也負重之國者兩腳也輕庭之屋者兩膝也無極外國者兩脅也無極自然之國者臍也太清虛無之屋者腹也青龍白虎朱雀玄武者大小腸胃也東方甲乙木者肝也南方丙丁火者心也西方庚辛金者肺也北方壬癸水者腎也中央戊己土者脾也十二國者兩手十二經脈也九重之臺者咽喉也天公當門而坐者舌也二十八元士者齒也日月在兩邊者兩目也天門地户者兩耳也松柏河水之間者眉也上有盤石廣大者額也修真之士思惟神氣出官者出身中之神也三五功曹者三島五靈宫神也五體真官者五體神也五氣君者五藏神也左右官使者兩腳也左右捧香侍者兩手大指也傳言玉女者小指也五帝直符者五指也三十六人出者出身中十二宫室二十四氣神也三氣正神者神及氣與形也故形非神不安非氣不行氣非形不立矣四海者心為血海腎為氣海腦為髓海脾為五穀之海也五湖者五藏各有液所主之位東西南北中是也九江者小腸上下有九曲也頂曰上田心曰中田腎曰下田即三島也閬苑即根源也華池在齒舌之間元潭在小腸之下瑶池出丹闕之前崑崙上接玉京天池正充內院鳳池則心肺之間玉池在唇齒之內神水生於氣中金波降於天上赤龍住處自有瓊液玉泉偃月曲江皆是左右兩目鵲橋正屬鼻梁解脫樓乃同泥丸歡喜樓人中即是如此名號未可備陳凡人之生也初父與母交精血造化而成於形若父精先進母血後行則血包精為男乃先生其右腎故屬陽應日主三魂降精氣赤而鎮丹田故命脈在右手之尺部也若母血先進父精後來則精裹血為女即先生其左腎故屬陰應月主七魄降真氣黑而鎮子宫故命脈在左手之尺部也男子先生右腎右腎生脾脾生肝肝生肺肺生心心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生左腎左腎生三焦三焦生三元女則胃生三焦三焦生右腎右腎生膀胱膀胱生三元三元生八脈八脈生十二經十二經生十五絡十五絡生一百八係絡係絡生一百八十五孫絡孫絡生一百八十五湟絡湟絡生三百六十五穴穴生三百六十五骨處胎十月而生始者一月為胞精血凝也二月為胎形兆胚也三月陽神為三魂動以生也四月陰靈為七魄靜鎮形也五月五行分五藏以安神也六月六律定六府用滋靈也七月七精開七竅通光明也八月八景神具降真靈也九月宫室羅布以定精也十月氣足萬象成也內有五藏外應五行經曰受胎之初所生二腎左為玄玄以升氣上傳於肝右為牝牝以納液下傳膀胱玄牝本乎無中來以無為有乃父母之真氣納於純陰之地故曰谷神不死是謂玄牝玄牝之門可比天地之根自腎而生五藏六府存焉肝曰青龍木在左無英居焉制三魂也其氣從脊腠左畔上入眼化為淚名真木餘氣流入上腭左畔名玉液也肺曰白虎金在右白元居焉制七魄也其氣從脊腠右畔上入鼻化為涕名真金餘氣流入上腭名金液也心曰朱雀火在上司命居焉納生源也其氣從胸前左畔上入舌却入心化為血名真火餘氣流入舌下左畔名神水也腎曰玄武水在下桃康居焉保精根也其氣從脾右畔上入耳化為耳塞却下腎名真水餘氣流入舌下右畔名華池也脾曰勾陳土處其中央長生大君居焉其氣從脊右畔上來入腦化為涎名真土餘氣流入唇頰內名玉池也經曰眉下五輪全在定中起五輪者眼也有血輪氣輪水輪金輪瞳輪謂主息入定中作也真人曰定中運水火於目中也故崔公以眼為鏡要得之五力乃大道之源皆在眼力也白睛屬肺赤脈屬心黑睛屬腎臉黃屬脾中有一點瑩明者屬於肝五藏精元聚在於眼也五藏氣全則有五色神光五藏懷寶則眼內視真景明如白晝五藏衰則神光不明五藏絶則神光落而死矣又曰眼為金剛之門鼻為爐竈鍊金之門户鼻乃主息出入為氣本由橐籥也金剛乃元神也出入眼中能內視久視則長生矣金公者肺中唾姹女者心中血也嬰兒者腎中精也黃婆者脾中涎也七寶者神氣脈精血唾水也亦為七返真制先令一身滋潤然後能生水水盛能生唾唾盛能變血血盛能鍊精精盛能補腦腦盛能壯氣氣盛則神全矣人之一軀以應五行生成之數心之上曰九天腎之下曰九地腎到心八寸四分心到重樓第一環到頂八寸四分則曰泥丸絳宫太一帝君居焉總衆神也自腎到頂凡二尺五寸二分計八十一丈元氣以應九九純陽之數凡一晝夜漏水下一百刻每一刻折六十分共六千分每一十分人息之出入有二十二息半凡百刻之中天左旋而地右轉人之氣血以合三才榮衛皆通天地之正氣一呼一吸謂之一息經絡開闢呼吸往來晝夜之間有一萬三千五百息呼吸皆等所呼者自己之元氣從內而出所吸者天地之正氣自外而入根源牢壯元陽無損呼吸之間可奪天地之正氣矣清者榮而濁者衛悉乃流通橫者絡而縱者經盡得舒暢然後寒暑不能侵勞苦不能害體強而骨健氣爽而神清常為不老之人永保無疆之壽真龍真虎者坎離也心腎也龍虎交媾以鍊金丹天寶內經曰嬰兒垞女氣合黃庭者是也以至功成行滿則為神仙長生不死之道矣天元人藥鏡崔真人希範迷余少遊雲水曾遇至人論養生之術修龍虎之要須知三川福地異境靈壇苦歷煙霞巡諸聖迹每將接道之侣互認必同余雖未親鼎爐略啓玄奧撰天元之祕法顯龍虎之妙道鉛汞之根源好道同流幸垂一覽原夫大朴既分氣降萬物繫乎生死死者未明生生則形存死則亡軀存亡可捨與道合真生乎神馭於精而盛於物物之最靈唯其人也身者乃神化之本精於人也若水浮航氣於人也如風揚塵神於人也似野馬聚空水涸則航止風息則塵靜野馬散而大空長存精能固物氣能盛物精氣神三者心可不動其變化也外忘其形內養其神是謂登真之路嗜欲縱乎心孰能久去哀樂傷乎志孰能久忘思慮役乎神孰能久無利祿勞乎身孰能久捨五味敗乎精孰能久節酒醴亂乎精孰能久絶食佳肴飲旨酒顧以姝麗聽以淫聲雖精氣強而反禍於身耳目快而致亂於神有百端之敗道無一芥之希真安有養身之驗耳夫學道者外則意不逐物內則意不隨心亂湛然保於虛寂造乎清淨之域譬如起屋之勞假一息之形氣尚穌神歸其清而況契於道保真丹所哉嵇康謂仙必可力致而學得在乎稟氣之自然也如蟬蛻空坐忘尸解投胎奪舍之法鉛汞之精坎離之妙御風逐雨飛鳧步水之徒軒轅化龍而出世秦人駕鳳以沖虛學而然後為神仙者古今有也豈為無術而致神仙者也生於方內知而有神仙儀及於方外之士者賢人也遠人也志人也學而不已曰賢賢而不已曰聖聖而不已曰神神而不已曰廓然沖乎宇宙之外出乎天地之間陰陽外合則生乎形內則生乎神心為神主無幽不燭無滯不通守默定心心定則氣和氣和則精凝精凝則神靈神靈則通真夫寢者有夢則神尚役其所既勞心歸所思夢寐之間心如得其自然安靜元氣降而偶合沖虛之理是謂至人無夢也夫養內丹者身法乎鼎精氣像乎鉛汞坎離像乎水火神明為體狀乎變化之靈久而精妙於氣神靈於精而脫於形體者類兹鉛汞浮沉也心去火者氣也氣者命也得之於心而失之於心也火者生死之命也心者亡精動氣之時事保於清淨也人之養丹如龍之養珠如孕婦養胎舉止護持恐有所傷待其功成內事驗丹之力若亂心敗氣勞體傷神漸而耗散真胎老子所謂如持盈滿之器一心內覓無令外求日月者天地至精坎離者人身大藥故聖人密外而知內以明神變之功蚌胎兔孕犀角鵲枝鴛頸鱉影螟蛉之子而蜾贏祝之氣不交也精不接也存之於心而通於神也故易云寂然不動感而遂通非天下至精孰能與於此必可名狀至於犬馬之賤尚知有玄關之要有心定志脫質遺形況於靈乎萬物者治養生之術長生久視之法希夷自然之理耶至於刻骨洗心視金石之志隆師親友不限貧賤富貴榮辱是非不侵世務頃刻之間敢忘於道細行不遺終纍大德決取神仙非定志不能大德得哉至言皇天無親惟德是輔內丹之圖於後唐庚子歲望日至一真人崔希範述坎離交媾之圖陰虎還從坎位生陽龍元向離中出修真十書雜著捷徑卷之二十一修真十書雜著捷徑卷之二十二李六勸道歌亂性多因縱酒損真愼勿傷茶太飽難於剋化飢時頻喫些些知足可以常足無思自是無邪若愛清虛恬淡何羡富貴榮華天真自然爐鼎赤水種就黃芽百病生於元氣一頂要聚三花妙用六通四闢循環運轉河車大道本來平易學流浪自波查三教元無二道和同都為一家愛河豈有窮極苦海浩無津涯奈何迷癡貪著白玉自作疵瑕不積涓埃功行因循自滿恆沙幸有超脫門路勿使六賊邀遮回機便同本得熟鍊鉛汞丹砂決定長生久視平地紫府煙霞登山各自努力千里毫釐不差莫待臘月三十是時追悔怨嗟虛靖先生大道歌司馬子微坐忘歌何仙姑亦作證道歌其言深切著明有補於世豫因拾神仙之遺旨作勸道歌普勸修真同證大道至遊居士曾慥書次韻勸道歌王承緒養疾扶衰在酒養疾扶衰固神養氣酒為百藥之長清神爽氣唯茶茶味清神爽氣勿令損氣本草圖經素淡之食加倍五腥之味減些黃庭經曰五味外美邪氣腥臭升神明胎氣零保養元和正氣無病可却百邪若要跳出生死先須識破浮華四獸分為四象青龍白虎朱雀玄武五氣産出五芽五芽者五藏真氣鼎內鍊成大藥目前自現金花畢法曰金液既成自現金花按日循緣八卦隨時般運三車小河車大河車紫河車畢法既悟火棗無核莫使交梨有查既曰三山有侣自知四海無家此二句全是海蟾語雲水千重活計松蘿萬頃生涯朱橘合真有象畢法曰形若彈丸色如朱橘元珠耀彩無瑕結庵曾栖草觀鍾離在終南山草樓觀結庵三十年化胡遠度流沙老君西升以化胡人有一門庭可入都被塵網相遮仙骨换却俗體吕公曰乞與貧儒换仙骨真汞休認凡砂平叔曰有人要識真鉛汞不是凡砂俗水銀忽化何須出殼吕公不出殼化火龍飛去久行必定飛霞黃庭經曰必久行之飛若霞神仙親傳祕訣不得時刻有差畢法曰以時行法以法求道迷徒不肯留意端坐待盡可嗟承緒字紹之儒學登科為夔州教授少得吞日精月華之術後悟道年八十餘康強如壯時此歌可知其為人紹之洛州人蔡薿榜紹之教授見和勸道歌深明至理復歌元韻曾慥述飢餐不嫌惡食薄酒勝飲釅茶享用雖有分量何似惜福留些氣和自無諸疾心正可辟衆邪日夜抱元守一朝昏含英咀華陰魄都齊消滅陽光內現萌芽此是真如般若無非翠竹黃花淵澄似開明鏡默運如轉繅車常珍嗜膾與炙異味屏梨與查九還七返成道十洲三島為家但使凡心去盡方驗吾生有涯超然離形釋智涣若蕩穢滌瑕大道分明直截多岐委曲周遮學而不斷貪欲辛苦作飯蒸砂窮年繫風捕影難將種玉餐霞大成是為究竟入處各有等差一朝火龍透出舉世仰望咨嗟承緒再用前韻氣壯何須飲酒睡少不必啜茶一點清虛有味六塵離著無些陽藉三魂作主陰藏七魄為邪畢法曰三魂為陽藉常數令人生七魄為陰藏常數令人死運化常隨北斗采真默契南華南華經曰是謂采真之道性明養道無損心地種丹有芽蔭仗長春琳幹黃庭經曰萬木有條可蔭仗俞其成七寶身也香聞不謝天花出老子太清經撞開內院金虎愚曰歸內院燒透崑崙火車西華夫人曰運火車燒透崑崙九醖斟酌不盡中黃經曰主生有九醖仙醪斟酌不竭三桃王母仙桃碧玉桃蟠桃咀嚼無查玄鶴飛來作伴白雲深處為家超出迷津有數沉淪苦海無涯功成自然多驗行滿誰指纖瑕取玉皆因剖石求金亦自淘沙得上十洲祖洲瀛洲玄洲炎洲長洲元洲流洲生洲鳳麟洲聚窟洲路去自有五彩雲遮既悟神爐有藥何勞九鼎飛砂男子為神爐女子為金鼎有志嗽泉枕石甘心釣月棲霞小法千門甚衆畢法曰旁門小法不合大道許真君曰三千六百法直路一條不差平叔曰一條直路上天堂别有門庭終皆會若不速修下手樹枯空有呼嗟黃庭經曰葉去枝枯失青又如人津氣既衰形必瘁慥三用韻休誇飲一石酒莫羡喫七碗茶三杯可通大道食後潄齒呷些東坡云食後以茶漱齒肥減茶去而脾胃不知五氣收歸丹竈一念不涉諸邪盎盎精神滿腹恂恂悃愊無華三田靈芝發秀九畹蘭茁其芽玉池充溢肥水黃庭經曰玉池清水上生肥紫雲蓋覆黃花李仙君詩云黃花生紫雲上關下關緊閉天鼓振響雷車日啖青精香飯不食苦李生查紛紛旁門小法籍籍諸子百家遊心在方之內望道眇天一涯疇能超然了悟純全其德不瑕用之寶如金玉不用棄若塵沙神仙論云用之如金如玉不用如泥如土明鏡本來無垢拂拭勿使塵遮留侯何用辟穀勾漏徒訪丹砂溫溫尺宅光透紅潮舒散綺霞三千功圓行滿靡有毫髮過差直上清都絳關群仙指點興嗟承緒三次韻少斟朱博案酒前漢朱博案上不過三杯罕烹陸羽神茶陸羽茶神腸瘦如繩有驗道人之腸如繩真氣充食自減腸自縮心熾似火無些不能墮心火則熾而與物爭一氣常通九竅一竅氣不通即病百骸莫受百邪八方邪氣當使寒灰復焰須令枯木生華返老還童除欲要固命蒂真精為命蒂絶愛自長道芽虛則道生既悟無中有物老子曰恍兮惚兮其中有物自然水裏開花西華曰水中花發四時香但取離宫鳳髓吕真人詩曰下用南方赤龍髓是也休隨門外羊車蓮經曰羊車鹿車今直門外别法鼎器多病鼎有十法自家園果少查平叔曰似何家園下種栽果成當自絶真胎得道實無所得老子清淨經曰雖名得道實無所得為化衆生名為得道返本出家不在離家每意未絶雖離家尚俗若諸念斷若在家猶出家也返本不出身內謾忙徒走天涯施真人詩曰謾忙人謾走不求自己别求難性根本來無纍命寶元自絶瑕平叔曰命寶不宜輕弄鍊丹須憑玉洞玉洞玉峯得藥號曰金沙有金沙鼎奧旨冝宗老氏頑空休泥盧遮毗盧遮那佛語若欲鍊形成氣須教變汞為砂畢法曰鍊形成氣乃為地仙又曰汞變而為砂鉛變而為金丹通玄前有黃谷黃帝遇黃谷子谷子曰别有通玄之語修真别有青霞青霞子得道垂訣千世子細推窮二教道釋長生寂滅有差焚身妄求舍利七寶壞却堪嗟人稟七寶身通判夔州軍州事郭邛次韻保形保生保命戒色戒酒戒茶夜氣若要長在晚食尤宜減些養心莫如寡欲存神須是間邪辨得天清地濁吞取日精月華寒灰便可發焰枯根立得生芽學者捨本逐末病眼執著空花罔窮聖道一轍徒誦丹書五車正似鍊金和礦何殊嚼蔗吞查不知達人到此元始浩劫為家燕坐能事畢矣已遍海角天涯鑑明不受微垢玉潔靡見纖瑕視軒冕如桎梏棄財寶若泥沙曲江一輪秋月豈容霧掩雲遮盤旋火龍水虎和合陰汞陽砂真身自然騰化駕鳳高凌紫霞哀哉旁門小法作用千種參差箇箇辛苦無成臨老空自悲嗟修真十書雜著捷徑卷之二十二
